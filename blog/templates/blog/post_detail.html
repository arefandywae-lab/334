{% extends 'blog/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <article>
        <span class="category">{{ post.category }}</span>
        <h1 style="margin: 10px 0;">{{ post.title }}</h1>
        <p style="color: #666; font-size: 0.9rem;">Posted on: {{ post.created_at|date:"M d, Y" }}</p>
        <hr style="margin: 20px 0;">
        <div class="content">
            {{ post.content|linebreaks }}
        </div>
        <hr style="margin: 20px 0;">
        <div style="display: flex; gap: 10px;">
            <a href="{% url 'post_update' post.pk %}" class="btn btn-primary">Edit</a>
            <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Delete</a>
            <a href="{% url 'post_list' %}" class="btn btn-secondary">Back to List</a>
        </div>
    </article>
{% endblock %}
