{% extends "base.html" %}

{% block title %}Delete Product{% endblock %}
{% block heading %}Delete Product{% endblock %}

{% block content %}
<p>Are you sure you want to delete the product "{{ product.name }}"</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
</form>
<br>
<a href="/product/read">Back to Product List</a>
{% endblock %}
