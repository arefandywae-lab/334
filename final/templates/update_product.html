{% extends "base.html" %}

{% block title %}Update Product{% endblock %}
{% block heading %}Update Product{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <table class="form-table">
        <tr>
            <th>NAME</th>
            <td>{{ form.name }}</td>
        </tr>
        <tr>
            <th>PRICE</th>
            <td>{{ form.price }}</td>
        </tr>
        <tr>
            <th>QUANTITY</th>
            <td>{{ form.quantity }}</td>
        </tr>
        <tr>
            <th>CATEGORY</th>
            <td>{{ form.category }}</td>
        </tr>
        <tr>
            <td></td>
            <td><button type="submit">Update</button></td>
        </tr>
    </table>
</form>
<br>
<a href="/product/read">Back to Product List</a>
{% endblock %}
